<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sched - main teste</title>
</head>
<body>
    <h1>Bem-vindo ao Sched!</h1>
    <p id="boas-vindas">Carregando dados...</p>
    
    <button onclick="logout()">Sair</button>

    <script>
        // Verifica se o usuário está logado logo de cara
        const token = localStorage.getItem("token");
        
        if (!token) {
            alert("Acesso não autorizado!");
            window.location.href = "pages/login.html"; // Redireciona para a tela de login
        }

        // Exemplo de como dar "Sair"
        function logout() {
            localStorage.removeItem("token"); // Joga o token fora
            window.location.href = "pages/login.html"; // Volta para a tela de login
        }
    </script>
</body>
</html>
