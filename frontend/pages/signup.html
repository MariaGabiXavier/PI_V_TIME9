<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Sign In | Sched</title>
  <link rel="icon" type="image/png" href="../assets/favicon_sched/android-chrome-192x192.png">

  <link rel="stylesheet" href="../css/sigup.css" />
  <link rel="stylesheet" href="../css/alert.css" />
</head>
<body>
  <div id="alert-container"></div> 

  <header class="header-auth">
    <img src="../assets/Logo.png" alt="Sched Logo" class="header-logo-image">
    <nav class="nav-shed">
      <a href="login.html" class="button-entrar">
        <img src="../assets/iconProfile.png" alt="User" class="btn-icon">
        Entrar
      </a>
  </nav>
</header>

  <div class="page">
    <div class="background"></div>

    <div class="welcome-text">
      <h2>Bem Vindo(a)</h2>
      <p class="subtitle">
        Use nossos formulários para fazer login ou criar sua conta!<br>no projeto totalmente grátis.
      </p>
    </div>

    <div class="card">
      <div class="form-group">
        <label>Nome da Empresa</label>
       <input id="name" type="text" placeholder="Nome registrado da empresa" />
    </div>

    <div class="form-group">
      <label>CNPJ da Empresa</label>
      <input id="cnpj" type="text" placeholder="CNPJ" />
    </div>

    <div class="form-group">
      <label>Email do Administrador</label>
      <input id="email" type="email" placeholder="Seu email" />
    </div>

    <div class="form-group">
      <label>Senha do Administrador</label>
      <input id="password" type="password" placeholder="Senha" />
    </div>

    <div class="form-group">
      <label>Confirmação de Senha</label>
      <input id="confirmPassword" type="password" placeholder="Confirme a senha" />
    </div>

    <div class="remember">
      <input type="checkbox" id="check" />
      <label for="check">Lembrar de mim</label>
    </div>

    <button class="btn" onclick="cadastrar()">Cadastrar</button>

    <p class="login">
      Já possui uma empresa cadastrada?
      <a href="login.html">Entrar</a>
    </p>
  </div>
</div>

<script src="../js/alert.js"></script>
<script>
  async function cadastrar() {
    const name = document.getElementById("name").value;
    const cnpj = document.getElementById("cnpj").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    const cnpjLimpo = cnpj.replace(/\D/g, "");

    // Validação de campos vazios
    if (!name || !cnpjLimpo || !email || !password) {
      if (typeof showAlert === "function") {
        showAlert('warning', 'AVISO!', 'Preencha todos os campos!');
      } else {
        alert("Preencha todos os campos!");
      }
      return;
    }

    // Validação de senhas
    if (password !== confirmPassword) {
      if (typeof showAlert === "function") {
        showAlert('error', 'ERRO!', 'As senhas não coincidem!');
      } else {
        alert("As senhas não coincidem!");
      }
      return;
    }

    const payload = {
      name: name,
      cnpj: cnpjLimpo,
      emailADMIN: email,
      passwordADMIN: password
    };

    try {
      console.log("Enviando dados para o servidor...");
      
      const response = await fetch("http://localhost:8080/auth/company", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        // Se salvou no banco, entramos aqui
        console.log("Sucesso no servidor!");
        
        if (typeof showAlert === "function") {
          showAlert('success', 'SUCESSO!', 'Empresa cadastrada com sucesso!');
        }

        // Redireciona após 2 segundos (tempo para o usuário ver o alerta)
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);

      } else {
        // Erro retornado pelo Java (ex: CNPJ já existe)
        const errorData = await response.json().catch(() => ({})); 
        console.error("Erro do servidor:", errorData);
        
        if (typeof showAlert === "function") {
          showAlert('error', 'ERRO!', errorData.message || "Dados inválidos");
        }
      }

    } catch (error) {
      console.error("Erro na requisição:", error);
      if (typeof showAlert === "function") {
        showAlert('error', 'SEM CONEXÃO', 'Não foi possível conectar ao servidor Java.');
      }
    }
  }
</script>
</body>
</html>
