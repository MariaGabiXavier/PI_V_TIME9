<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Sched</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/produto.css">
    <link rel="stylesheet" href="../css/alert.css">
</head>
<body>
    <div id="alert-container"></div>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <img src="../assets/logo_menu.png" alt="Sched">
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icone_casa.png" alt="Dashboard">
                    </div>
                    <span>Dashboard</span>
                </a>
                <a href="produto.html" class="menu-item active">
                    <div class="icon-box">
                        <img src="../assets/icon_produtos.png" alt="Produtos">
                    </div>
                    <span>Produtos</span>
                </a>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_estoque.png" alt="Estoque">
                    </div>
                    <span>Estoque</span>
                </a>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_vendas.png" alt="Vendas">
                    </div>
                    <span>Vendas</span>
                </a>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_alertas.png" alt="Alertas">
                    </div>
                    <span>Alertas</span>
                </a>
                <span class="admin-title">ADMIN (apenas)</span>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_user.png" alt="">
                    </div>
                    <span>Funcionários</span>
                </a>
                <div class="help-card">
                    <div class="help-icon">
                        <img src="../assets/icon_help.png" alt="">
                    </div>
                    <div class="help-text">
                        <strong>Precisa de ajuda?</strong>
                        <p>Entre em contato com nosso time!</p>
                    </div>
                    <button class="help-button">Entre em contato</button>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="page-header-left">
                    <div class="breadcrumb">
                        <span class="breadcrumb-muted">Páginas</span>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-active">Produtos</span>
                    </div>
                    <h1 class="page-title">Produtos</h1>
                </div>
                <div class="page-header-right">
                    <button class="topbar-icon"><img src="../assets/iconProfile.png" alt=""></button>
                    <button class="topbar-icon"><img src="../assets/Icon_conf.png" alt=""></button>
                    <button class="topbar-icon"><img src="../assets/Icon_sino.png" alt=""></button>
                </div>
            </header>
            <div class="action-bar">
                <input type="text" placeholder="Type here..." class="search-input">
                <button class="btn-new" id="btnOpen">Novo Produto</button>
            </div>
            <section class="card-table">
                <div class="card-header">
                    <h3>Produtos Registrados</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>PRODUTO</th>
                            <th>PREÇO</th>
                            <th>TIPO DO PRODUTO</th>
                            <th>CATEGORIA</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">

            <div class="modal-header">
                <div>
                    <h2>Novo Produto</h2>
                    <p><strong>Registre</strong> os detalhes do produto</p>
                </div>
                <span class="close-icon" id="btnClose">&times;</span>
            </div>

            <div class="modal-form">

                <!-- Nome -->
                <div class="form-group full">
                    <label>Nome do Produto *</label>
                    <input type="text" id="productName" placeholder="Nome do Produto">
                </div>

                <!-- Quantificação -->
                <div class="form-group">
                    <label>Tipo da quantificação *</label>
                    <select id="unitOfMeasure">
                        <option disabled selected>Quantificação</option>
                        <option value="UNIDADES">Unidades</option>
                        <option value="CAIXAS">Caixas</option>
                        <option value="PACOTES">Pacotes</option>
                        <option value="LATAS">Latas</option>
                        <option value="GARRAFAS">Garrafas</option>
                        <option value="SACOS">Sacos</option>
                        <option value="FARDOS">Fardos</option>
                        <option value="KG">Kg</option>
                        <option value="G">g</option>
                    </select>
                </div>

                <!-- Preço -->
                <div class="form-group">
                    <label>Preço *</label>
                    <div class="input-price">
                        <span>R$</span>
                        <input type="text" id="productPrice" placeholder="00,00">
                    </div>
                </div>

                <!-- Tipo -->
                <div class="form-group">
                    <label>Tipo do Produto *</label>
                    <select id="productType">
                        <option disabled selected>Tipo do Produto</option>
                        <option value="true">Perecível</option>
                        <option value="false">Não Perecível</option>
                    </select>
                </div>

                <!-- Categoria -->
                <div class="form-group">
                    <label>Categoria *</label>
                    <select id="productCategory">
                        <option disabled selected>Categoria</option>
                        <option value="Bebida Alcoólica">Bebida Alcoólica</option>
                        <option value="Bebida">Bebida</option>
                        <option value="Carne">Carne</option>
                        <option value="Vegetal">Vegetal</option>
                        <option value="Doce">Doce</option>
                        <option value="Mercearia">Mercearia</option>
                        <option value="Salgadinho">Salgadinho</option>
                        <option value="Tabacaria">Tabacaria</option>
                        <option value="Limpeza">Limpeza</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancel">Cancelar</button>
                <button class="btn-save" id="btnSaveProduct">Salvar Produto</button>
            </div>

        </div>
    </div>

    <script>
        const modal = document.getElementById('modalOverlay');
        const btnOpen = document.getElementById('btnOpen');
        const btnClose = document.getElementById('btnClose');
        const btnCancel = document.getElementById('btnCancel');
        btnOpen.onclick = () => modal.style.display = 'flex';
        const fechar = () => modal.style.display = 'none';
        btnClose.onclick = fechar;
        btnCancel.onclick = fechar;
        window.onclick = (event) => {
            if (event.target == modal) fechar();
        }
    </script>

    <script src="../js/alert.js"></script>
    <script src="../js/produto.js"></script>
</body>
</html>
