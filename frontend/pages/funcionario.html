<!DOCTYPE html>

  <a href="../pages/produto.html" class="menu-item">

  </a>

  <a href="../pages/estoque.html" class="menu-item">
    <div class="icon-box">

  </a>

  <a href="#" class="menu-item">
    <div class="icon-box">
      <img src="../assets/icon_vendas.png" alt="Vendas">

      <div class="icon-box">
          <img src="../assets/icon_alertas.png" alt="Alertas">

      <span>Funcionários</span>

    <div class="help-card">
      <div class="help-icon">
        <img src="../assets/icon_help.png" alt="">
      </div>
    <div class="help-text">
      <strong>Precisa de ajuda?</strong>
      <p>Entre em contato com nosso time!</p>
    </div>
    <button class="help-button">Entre em contato</button>
</div>
</nav>
    </aside>
  <main>
      <header class="page-header">
        <div class="page-header-top">
            <div class="page-header-left">
                <div class="breadcrumb">

                    <span class="breadcrumb-separator">/</span>

        </div>

            </div>
        </div>
      </header>

        <div class="action-bar">
            <div class="action-bar-left" style="display: flex; gap: 15px; align-items: center;">

                </div>
                <button class="btn-new" id="btnOpen">+ Cadastrar Funcionário</button>
            </div>

          <div class="table">
              <div class="table-header">
                  <span>NOME</span>

                  <span>TIPO DO FUNCIONÁRIO</span>

    <script src="../js/auth.js"></script>
    <script src="../js/alert.js"></script>
