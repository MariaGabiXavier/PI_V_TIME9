<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Funcionários | Sched</title>
    <link rel="icon" type="image/png" href="../assets/favicon_sched/android-chrome-192x192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/funcionario.css">
    <link rel="stylesheet" href="../css/alert.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">
            <img src="../assets/logo/ic_logo_rainbow.svg" alt="Sched">
        </div>

        <nav class="menu">
            <a href="dashboard.html" class="menu-item">
                <div class="icon-box">
                    <img src="../assets/ic_base_screen/ic_home.svg" alt="Dashboard">
                </div>
                <span>Dashboard</span>
            </a>

            <a href="produto.html" class="menu-item">
                <div class="icon-box">
                    <img src="../assets/ic_base_screen/ic_box.svg" alt="Produtos">
                </div>
                <span>Produtos</span>
            </a>

            <a href="estoque.html" class="menu-item">
                <div class="icon-box">
                    <img src="../assets/ic_base_screen/ic_graphic.svg" alt="Estoque">
                </div>
                <span>Estoque</span>
            </a>

            <a  href="vendas.html" class="menu-item">
                <div class="icon-box">
                    <img src="../assets/ic_base_screen/ic_rocket.svg" alt="Vendas">
                </div>
                <span>Vendas</span>
            </a>

            <a href="alertas.html" class="menu-item">
                <div class="icon-box">
                    <img src="../assets/ic_base_screen/ic_bell.svg" alt="Alertas">
                </div>
                <span>Alertas</span>
            </a>

            <div id="adminMenu" style="display: none;">
                <span class="admin-title">ADMIN (apenas)</span>
                <a href="funcionario.html" class="menu-item active">
                    <div class="icon-box">
                        <img src="../assets/ic_base_screen/ic_user.svg" alt="">
                    </div>
                    <span>Funcionários</span>
                </a>
            </div>

            <div class="help-card">
                <div class="help-icon">
                    <img src="../assets/ic_base_screen/ic_help.svg" alt="">
                </div>
                <div class="help-text">
                    <strong>Precisa de ajuda?</strong>
                    <p>Entre em contato com nosso time!</p>
                </div>
                <a href="mailto:suporte@sched.com.br" class="help-button" style="text-decoration: none; text-align: center; display: block;">Entre em contato</a>
            </div>
        </nav>
    </aside>
  <main>
      <div class="page-header">
          <div class="page-header-left">
              <div class="breadcrumb">
                  <span class="breadcrumb-muted">Páginas</span>
                  <span class="breadcrumb-separator">/</span>
                  <span class="breadcrumb-active">Funcionários</span>
              </div>

              <h1 class="page-title">Página de Funcionários</h1>
          </div>

          <div class="page-header-right">
              <button class="topbar-icon">
                  <img src="../assets/ic_base_screen/ic_user_profile.svg" alt="">
              </button>
          </div>
      </div>

      <div class="action-bar">
        <div class="action-bar-left" style="display: flex; gap: 15px; align-items: center;">
            <div class="search-container">
                <img class="search-icon" src="../assets/ic_ui/ic_search.svg">
                <input type="text" placeholder="Pesquisar produto..." class="search-input">
            </div>
            <button class="btn-new" id="btnOpen">+ Cadastrar Funcionário</button>
        </div>
      </div>

      <section class="card">
          <h2>Lista de Funcionários</h2>

          <div class="table">
              <div class="table-header">
                  <span>NOME</span>
                  <span>EMAIL</span>
                  <span>TIPO DO FUNCIONÁRIO</span>
                  <span>AÇÕES</span>
              </div>
          </div>
      </section>
  </main>
</div>

<div id="employeeModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h2>Cadastrar Funcionário</h2>

        <form id="employeeForm">
            <div class="form-group">
                <label>Nome do Funcionário</label>
                <input type="text" id="empName" placeholder="Nome do funcionário" required>
            </div>

            <div class="form-group">
                <label>Email do Funcionário</label>
                <input type="email" id="empEmail" placeholder="Email profissional" required>
            </div>

            <div class="form-group">
                <label>Senha do Funcionário</label>
                <input type="password" id="empPassword" placeholder="Senha do funcionário" required>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-primary">CADASTRAR</button>
                <button type="button" class="btn-secondary" id="btnCancelModal">CANCELAR</button>
            </div>
        </form>
    </div>
</div>
    <script src="../js/auth.js"></script>
    <script src="../js/alert.js"></script>
    <script src="../js/funcionario.js"></script>
</body>
</html>
