<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque | Sched</title>
    <link rel="icon" type="image/png" href="../assets/favicon_sched/android-chrome-192x192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estoque.css">
</head>
<body>
    <div id="alert-container"></div>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <img src="../assets/logo_menu.png" alt="Sched">
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icone_casa.png" alt="Dashboard">
                    </div>
                    <span>Dashboard</span>
                </a>
                <a href="produto.html" class="menu-item ">
                    <div class="icon-box">
                        <img src="../assets/icon_produtos.png" alt="Produtos">
                    </div>
                    <span>Produtos</span>
                </a>
                <a href="estoque.html" class="menu-item active">
                    <div class="icon-box">
                        <img src="../assets/icon_estoque.png" alt="Estoque">
                    </div>
                    <span>Estoque</span>
                </a>
                <a  href="vendas.html" class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_vendas.png" alt="Vendas">
                    </div>
                    <span>Vendas</span>
                </a>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_alertas.png" alt="Alertas">
                    </div>
                    <span>Alertas</span>
                </a>
                <span class="admin-title">ADMIN (apenas)</span>
                <a class="menu-item">
                    <div class="icon-box">
                        <img src="../assets/icon_user.png" alt="">
                    </div>
                    <span>Funcionários</span>
                </a>
                <div class="help-card">
                    <div class="help-icon">
                        <img src="../assets/icon_help.png" alt="">
                    </div>
                    <div class="help-text">
                        <strong>Precisa de ajuda?</strong>
                        <p>Entre em contato com nosso time!</p>
                    </div>
                    <button class="help-button">Entre em contato</button>
                </div>
            </nav>
        </aside>
       <main class="main-content">
            <header class="page-header">
                <div class="page-header-left">
                    <div class="breadcrumb">
                        <span class="breadcrumb-muted">Páginas</span>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-active">Estoque</span>
                    </div>
                    <h1 class="page-title">Produtos em Estoque</h1>
                </div>
                <div class="page-header-right">
                    <button class="topbar-icon"><img src="../assets/iconProfile.png" alt=""></button>
                    <button class="topbar-icon"><img src="../assets/Icon_conf.png" alt=""></button>
                    <button class="topbar-icon"><img src="../assets/Icon_sino.png" alt=""></button>
                </div>
            </header>

            <div class="action-bar">
                <div class="action-bar-left" style="display: flex; gap: 15px; align-items: center;">
                    <div class="search-container">
                        <img class="search-icon">
                        <input type="text" placeholder="Pesquisar produto..." class="search-input">
                    </div>
                    <button class="btn-new btn-history">Histórico de Estocagem</button>
                </div>
                <p class="instruction-text">Clique em um produto para <strong>registrar estocagem.</strong></p>
            </div>

            <section class="stock-grid"></section>
        </main>
    </div>

    <div id="stockModal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 id="modalHeaderTitle">Entrada de Estoque</h2> 
            <button class="close-modal">&times;</button>
        </div>
        
        <form id="stockForm">
            <div class="modal-body">
                <div class="modal-preview-section">
                    <div id="cardPreview" class="stock-card preview-card"></div>
                </div>

                <div class="modal-divider-icon">⇄</div>

                <div class="modal-fields-section">
                    <div class="form-group">
                        <label>Quantidade adicionada</label>
                        <input type="number" id="stockQuantity" required>
                    </div>

                    <div id="perishableFields" style="display: none;">
                        <div class="form-group">
                            <label>Data de validade do lote</label>
                            <input type="date" id="stockExpiry">
                        </div>
                    </div>
                </div>
            </div>

            
        <div class="modal-actions-edit">
            <button type="button" class="btn-delete-red close-modal">Cancelar</button>
            <button type="submit" class="btn-save-gradient" id="btnSaveEdit">Registrar entrada</button>
        </div>
        </form>
    </div>
</div>
<script src="../js/alert.js"></script>
<script src="../js/estoque.js"></script>
</body>
</html>
