<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/newProduct.css">
    <title>Novo Produto</title>
</head>
<body>

    <div class="modal">
        <div class="close-icon">&times;</div>
        
        <h2>Novo Produto</h2>
        <div class="subtitle"><strong>Registre</strong> os detalhes do produto</div>

        <div class="grid-container">
            <div class="label-cell">Produto</div>
            <div class="label-cell">Preço</div>
            <div class="label-cell">Tipo do Produto</div>
            <div class="label-cell">Categoria</div>

            <div class="divider"></div>

            <input type="text" placeholder="Nome do Produto">

            <div class="price-container">
                <span class="currency">R$</span>
                <input type="text" class="price-input" placeholder="00,00">
            </div>

            <select required>
                <option value="" disabled selected>Selecione</option>
                <option value="perecivel">Perecível</option>
                <option value="nao-perecivel">Não Perecível</option>
            </select>

            <select required>
                <option value="" disabled selected>Selecione</option>
                <option value="carnes">Carnes</option>
                <option value="congelados">Congelados</option>
            </select>
        </div>

        <div class="actions">
            <button class="btn btn-red">Cancelar</button>
            <button class="btn btn-purple">Salvar Produto</button>
        </div>
    </div>

</body>
</html>
